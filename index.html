<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="case">
        <div class="viewport">
            <p>0</p>
        </div>
        <div class="buttons">
            <div class="row">
                <button class="calc-button operator" id="backspace">E</button>
                <button class="calc-button operator" id="ac">AC</button>
                <button class="calc-button operator" id="percent-of">%</button>
                <button class="calc-button operator" id="divide">&divide;</button>
            </div>
            <div class="row">
                <button class="calc-button number" id="seven">7</button>
                <button class="calc-button number" id="eight">8</button>
                <button class="calc-button number" id="nine">9</button>
                <button class="calc-button operator" id="multiply">&#215;</button>
            </div>
            <div class="row">
                <button class="calc-button number" id="four">4</button>
                <button class="calc-button number" id="five">5</button>
                <button class="calc-button number" id="six">6</button>
                <button class="calc-button operator" id="minus">&minus;</button>
            </div>
            <div class="row">
                <button class="calc-button number" id="one">1</button>
                <button class="calc-button number" id="two">2</button>
                <button class="calc-button number" id="three">3</button>
                <button class="calc-button operator" id="plus">&plus;</button>                
            </div>
            <div class="row">
                <button class="calc-button operator" id="plus-minus">&#177;</button>
                <button class="calc-button number" id="zero">0</button>
                <button class="calc-button operator" id="period">.</button>
                <button class="calc-button operator" id="equal">&equals;</button>                
            </div>
        </div>
    </div>
</body>
</html>
