<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="case">
        <div class="viewport"></div>
        <div class="buttons">
            <div class="row">
                <button id="backspace">E</button>
                <button id="ac">AC</button>
                <button id="percent-of">%</button>
                <button id="divide">&divide;</button>
            </div>
            <div class="row">
                <button id="7">7</button>
                <button id="8">8</button>
                <button id="9">9</button>
                <button id="multiply">&#215;</button>
            </div>
            <div class="row">
                <button id="7">4</button>
                <button id="8">5</button>
                <button id="9">6</button>
                <button id="multiply">&minus;</button>
            </div>
            <div class="row">
                <button id="7">1</button>
                <button id="8">2</button>
                <button id="9">3</button>
                <button id="multiply">&plus;</button>                
            </div>
            <div class="row">
                <button id="7">&#177;</button>
                <button id="8">0</button>
                <button id="9">.</button>
                <button id="multiply">&equals;</button>                
            </div>
        </div>
    </div>
</body>
</html>
